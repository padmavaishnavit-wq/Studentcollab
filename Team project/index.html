<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudentCollab - Find Teammates & Build Projects</title>
    <link rel="stylesheet" href="styles/main.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Ionicons for modern icons -->
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</head>
<body>
    <nav class="navbar glass-effect">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <ion-icon name="rocket"></ion-icon>
                <span>StudentCollab</span>
            </a>
            <button class="btn btn-primary" id="openCreateProjectModal">
                <ion-icon name="add-circle-outline"></ion-icon> Create Project
            </button>
        </div>
    </nav>

    <header class="hero">
        <div class="hero-content">
            <h1>Build something amazing together.</h1>
            <p>Find teammates, manage your tasks, and communicate—all in one place built just for students.</p>
        </div>
    </header>

    <main class="container">
        <div class="section-header">
            <h2>Explore Projects</h2>
            <div class="filters">
                <input type="text" id="searchProjects" placeholder="Search projects or skills..." class="search-input">
            </div>
        </div>

        <!-- Dashboard Grid -->
        <div class="project-grid" id="projectGrid">
            <!-- Project cards will be injected here by app.js -->
        </div>
    </main>

    <!-- Create Project Modal -->
    <div class="modal" id="createProjectModal">
        <div class="modal-content glass-effect">
            <div class="modal-header">
                <h3>Start a New Project</h3>
                <button class="close-btn" id="closeModal"><ion-icon name="close"></ion-icon></button>
            </div>
            <form id="createProjectForm">
                <div class="form-group">
                    <label for="projectName">Project Name</label>
                    <input type="text" id="projectName" placeholder="e.g. AI Chatbot" required>
                </div>
                <div class="form-group">
                    <label for="projectDesc">Description</label>
                    <textarea id="projectDesc" rows="4" placeholder="What are you building?" required></textarea>
                </div>
                <div class="form-group">
                    <label for="projectSkills">Required Skills</label>
                    <input type="text" id="projectSkills" placeholder="e.g. React, Python, UI Design (comma separated)" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block">Publish Project</button>
            </form>
        </div>
    </div>

    <script src="scripts/storage.js"></script>
    <script src="scripts/app.js"></script>
</body>
</html>
